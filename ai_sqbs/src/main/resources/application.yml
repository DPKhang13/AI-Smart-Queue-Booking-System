app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  mail:
    from: ${MAIL_FROM:${SPRING_MAIL_USERNAME:no-reply@smartqueue.local}}
    sender-name: ${MAIL_SENDER_NAME:AI Smart Queue}
  otp:
    secret: ${OTP_SECRET}
    email-verification-expiration-minutes: 5
    resend-cooldown-seconds: 60
    max-attempts: 5
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

spring:
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
          timeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}
  data:
    redis:
      repositories:
        enabled: false
