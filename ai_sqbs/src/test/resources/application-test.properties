spring.datasource.url=jdbc:h2:mem:ai_sqbs_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

app.jwt.access-secret=test-access-secret-test-access-secret-test-access-secret
app.jwt.refresh-secret=test-refresh-secret-test-refresh-secret-test-refresh-secret
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.cookie.refresh-token-name=sq_refresh_token
app.cookie.refresh-token-path=/api/auth
app.cookie.http-only=true
app.cookie.secure=false
app.cookie.same-site=Strict
app.cors.allowed-origins[0]=http://localhost:3000
app.cors.allowed-origins[1]=http://localhost:5173
app.mail.from=test@smartqueue.local
app.mail.sender-name=AI Smart Queue Test
app.otp.secret=test-otp-secret-that-is-at-least-thirty-two-characters
app.otp.email-verification-expiration-minutes=5
app.otp.resend-cooldown-seconds=60
app.otp.max-attempts=5
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
